name: Release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release"
        required: true

jobs:
  release:
    uses: Skiley/rust-binary-publish/.github/workflows/release.yml@v1.0.0
    permissions:
      contents: write
      id-token: write
    with:
      bin: j18n
      crate: j18n-cli
      npm-description: "j18n CLI — LLM-powered syncing of translated locale files"
      npm-package: "@j18n/cli"
      tag: ${{ inputs.tag || github.ref_name }}
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
