name: Setup j18n
description: Installs the j18n CLI and adds it to PATH
author: JoaaoVerona

inputs:
  version:
    description: 'Version to install (e.g. v0.2.0). Defaults to latest. Ignored when `from-source` is true.'
    default: latest
  from-source:
    description: |
      If `true`, build j18n from the current checkout via `cargo build` and add
      `target/debug` to PATH instead of downloading a release archive. Used
      internally to test the working-tree version of the CLI; external consumers
      should leave this unset.
    default: 'false'

runs:
  using: composite
  steps:
    - name: Resolve target
      if: inputs.from-source != 'true'
      id: target
      shell: bash
      run: |
        case "$RUNNER_OS" in
          Linux)   os=unknown-linux-musl ;;
          macOS)   os=apple-darwin ;;
          Windows) os=pc-windows-msvc ;;
          *)       echo "Unsupported OS: $RUNNER_OS" >&2; exit 1 ;;
        esac

        case "$RUNNER_ARCH" in
          X64)   arch=x86_64 ;;
          ARM64) arch=aarch64 ;;
          *)     echo "Unsupported arch: $RUNNER_ARCH" >&2; exit 1 ;;
        esac

        if [ "$RUNNER_OS" = "Windows" ]; then ext=zip; else ext=tar.xz; fi

        echo "target=${arch}-${os}" >> "$GITHUB_OUTPUT"
        echo "ext=${ext}" >> "$GITHUB_OUTPUT"

    - name: Install j18n
      if: inputs.from-source != 'true'
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
        TARGET: ${{ steps.target.outputs.target }}
        EXT: ${{ steps.target.outputs.ext }}
      run: |
        archive="j18n-cli-${TARGET}.${EXT}"

        if [ "$VERSION" = "latest" ]; then
          url="https://github.com/JoaaoVerona/j18n/releases/latest/download/${archive}"
        else
          url="https://github.com/JoaaoVerona/j18n/releases/download/${VERSION}/${archive}"
        fi

        install_dir="$RUNNER_TEMP/j18n-bin"
        mkdir -p "$install_dir"
        curl -fsSL "$url" -o "$RUNNER_TEMP/$archive"

        if [ "$EXT" = "zip" ]; then
          unzip -q "$RUNNER_TEMP/$archive" -d "$RUNNER_TEMP"
        else
          tar -xJf "$RUNNER_TEMP/$archive" -C "$RUNNER_TEMP"
        fi

        mv "$RUNNER_TEMP/j18n-cli-${TARGET}"/j18n* "$install_dir/"
        echo "$install_dir" >> "$GITHUB_PATH"
        "$install_dir"/j18n* --version

    - name: Build j18n from source
      if: inputs.from-source == 'true'
      shell: bash
      run: |
        cargo build -p j18n-cli
        bin_dir="$GITHUB_WORKSPACE/target/debug"
        if [ "$RUNNER_OS" = "Windows" ]; then bin="$bin_dir/j18n.exe"; else bin="$bin_dir/j18n"; fi
        echo "$bin_dir" >> "$GITHUB_PATH"
        "$bin" --version
